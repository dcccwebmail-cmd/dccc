    <script>
      (function () {
        // Get the full path. Example: /<base>/about
        const path = window.location.pathname;
        
        // A list of top-level routes in the React app.
        const appRoutes = ['about', 'departments', 'events', 'panels', 'admin', 'join', 'join-admin'];

        const pathSegments = path.split('/').filter(Boolean);
        let firstRouteSegmentIndex = pathSegments.findIndex(segment => appRoutes.includes(segment));
        
        let basename = '/';
        if (firstRouteSegmentIndex > 0) {
            // If a route is found, but not at the root, the path before it is the basename.
            // e.g. /base/about -> basename is /base
            basename = '/' + pathSegments.slice(0, firstRouteSegmentIndex).join('/');
        } else if (firstRouteSegmentIndex === -1 && pathSegments.length > 0) {
            // If NO route segment is found, assume the whole path is the basename.
            // e.g. /base/ -> basename is /base
            // This handles initial load to the app's root in a sub-directory.
            basename = '/' + pathSegments.join('/');
        }
        
        window.APP_BASENAME = basename;
      })();
    </script>
